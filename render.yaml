services:
  - type: web
    name: t1era-ai-server
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn t1era_server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: RUNPOD_API_KEY
        sync: false          # set manually in Render dashboard
      - key: RUNPOD_ENDPOINT_ID
        sync: false          # set manually in Render dashboard
      - key: RUNPOD_MODEL
        value: qwen/qwen3-14b-awq
      - key: ALLOWED_ORIGIN
        sync: false          # set to your Netlify URL in Render dashboard
